name: Cuaca Kebun (harian)

on:
  schedule:
    # Kirim 3x sehari di jam "ganjil" (menit non-bulat) biar tidak pas jam bulat.
    # Waktu Singapura (SGT = UTC+8):
    #   07:32 SGT  ->  cron "32 23" (UTC hari sebelumnya)
    #   12:47 SGT  ->  cron "47 4"
    #   18:23 SGT  ->  cron "23 10"
    # notify.py punya jeda minimum antar-kirim (MIN_GAP_HOURS) biar tidak dobel.
    - cron: "32 23 * * *"
    - cron: "47 4 * * *"
    - cron: "23 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install "matplotlib>=3.8,<4.0"
      - name: Ambil data cuaca (Open-Meteo)
        run: python scripts/fetch_weather.py
      - name: Buat grafik (chart.png)
        run: python scripts/make_chart.py
      - name: Simpan data ke repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cuaca.json chart.png
          git commit -m "Update data cuaca $(date -u +%F)" || echo "Tidak ada perubahan"
          git pull --rebase || true
          git push || echo push dilewati
      - name: Kirim notifikasi harian
        env:
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/notify.py
      - name: Simpan status kirim
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_sent.json || true
          git commit -m "Update status kirim $(date -u +%F)" || echo "Tidak ada perubahan"
          git pull --rebase || true
          git push || echo push dilewati
      - name: Peringatan bila GAGAL (WhatsApp)
        if: failure()
        env:
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
        run: python scripts/alert_fail.py
